services:
  backend:
    build: /backend
    container_name: llm-backend
    networks:
      - llm-backend-net
    environment:
      - DATABASE_URL=postgresql://admin:admin@db:5432/auth_db
    depends_on:
      - db

  frontend:
    build: /frontend
    container_name: llm-frontend
    networks:
      - llm-backend-net
      - llm-frontend-net
    ports:
      - "3000:80"

  db:
    image: postgres
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER: admin
      - POSTGRES_PASSWORD: admin
      - POSTGRES_DB: postgres-db
    volumes:
      -postgres_data:/var/lib/postgresql/data
    networks:
      - llm-backend-net
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL: admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - llm-frontend-net
    ports:
      - "5050:80"
      
volumes:
  postgres_data:

networks:
  llm-backend-net:
  llm-frontend-net:
